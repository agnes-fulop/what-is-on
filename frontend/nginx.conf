server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the backend service. The frontend bundle ships with
    # an empty VITE_API_URL so /api requests stay relative and land here.
    location /api {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback so deep links (e.g. /events/:id) resolve to the bundle.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long cache for hashed asset filenames Vite emits.
    location /assets/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }
}
